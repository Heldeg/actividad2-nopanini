<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Iniciar Sesión</h1>
        @if (errorMessage()) {
        <div class="error-message">
            <p>{{errorMessage() }}</p>
        </div>
        }
        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <div class="input-wrap">
                    <input type="email" id="email" name="email" #emailInput="ngModel" [(ngModel)]="request.email"
                        required
                        placeholder="email@example.com"
                        >
                </div>
                @if (!emailInput.valid && emailInput.touched) {
                <small>Por favor, introduce un email válido</small>
                }
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <div class="input-wrap">
                    <input type="password" id="password" #passwordInput="ngModel" name="password"
                        [(ngModel)]="request.password" required>
                </div>
                @if (!passwordInput.valid && passwordInput.touched) {
                <small>La contraseña es requerida</small>
                }
            </div>


            <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || loading()">
                @if (loading()) {
                <span class="button-spinner" aria-hidden="true"></span>
                <span>Ingresando...</span>
                } @else {
                <span>Iniciar sesión</span>
                }
            </button>
        </form>
        <p>¿No tienes una cuenta? <a routerLink="/register" class="register-link">Regístrate aquí</a></p>
    </div>

</div>

<app-footer></app-footer>
