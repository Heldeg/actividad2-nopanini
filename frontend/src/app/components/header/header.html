<header class="topbar">
    <div class="brand">
        <svg class="book-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22z"></path>
            <path d="M4 4.5V22h13.5"></path>
        </svg>
        <a href="/"><span>NOPANINI</span></a>
    </div>
    <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6"></circle>
            <line x1="16" y1="16" x2="21" y2="21"></line>
        </svg>
        <input type="text" placeholder="Buscar libros o autores..." (input)="onSearch($event)" />
    </div>

    <div class="top-actions">
        @if(!isLoggedIn()) {
        <button type="button" class="login-btn" (click)="onLogin()">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="3.5"></circle>
                <path d="M5 20a7 7 0 0 1 14 0"></path>
            </svg>
            Iniciar Sesión
        </button>
        } @else {
        <!-- add role info -->
        <span class="role-info">Perfil: {{ getRole() | titlecase }}</span>
        <button type="button" class="logout-btn" (click)="onLogout()" aria-label="Cerrar Sesión"
            [disabled]="logoutLoading()">
            @if (!logoutLoading()) {
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Cerrar Sesión</span>
            } @else {
            <span class="button-spinner" aria-hidden="true"></span>
            <span>Cerrando...</span>
            }
        </button>
        }
    </div>
</header>
