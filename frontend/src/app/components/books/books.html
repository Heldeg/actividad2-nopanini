<main class="content">
    <section>
        <h2 class="section-title books-title">Todos los libros</h2>
        <div class="books-grid">
            @if (loading()) {
            <div class="spinner-wrap" aria-live="polite" aria-busy="true">
                <span class="loading-spinner" aria-hidden="true"></span>
                <span class="loading-label">Cargando libros...</span>
            </div>
            } @else {
            @for (book of bookList(); track book.title) {
            <article class="book-card">
                <div class="cover-zone">
                    @if (book.cover_image) {
                    <div class="cover-container">
                        <img [src]="book.cover_image" alt="Portada del libro {{ book.title }}" class="book-cover" />
                    </div>
                    } @else {
                    <div class="cover-outline">
                        <span class="cover-label">Portada<br />del libro</span>
                    </div>
                    }
                </div>
                <div class="book-info">
                    <div>
                        <span class="book-tag">{{ book.isbn }}</span>
                    </div>
                    <div>
                        <a class="details-link" (click)="bookDetails(book)">Ver detalles</a>
                    </div>
                </div>
                <h3 class="book-title">{{ book.title | uppercase }}</h3>

            </article>
            } @empty {
                <p class="no-books-message">No se encontraron libros.</p>
            }
            }
        </div>
    </section>
</main>
